  # ── Attendance ──
  /attendance:
    get:
      operationId: listAttendance
      tags: [attendance]
      summary: List attendance records
      parameters:
        - name: studentId
          in: query
          schema:
            type: integer
        - name: subjectId
          in: query
          schema:
            type: integer
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Attendance"
    post:
      operationId: markAttendance
      tags: [attendance]
      summary: Mark attendance for students
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkAttendanceBody"
      responses:
        "201":
          description: Attendance marked
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Attendance"

  /attendance/student/{studentId}/summary:
    get:
      operationId: getStudentAttendanceSummary
      tags: [attendance]
      summary: Get attendance summary for a student
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Attendance summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceSummaryItem"

  # ── Fees ──
  /fee-structures:
    get:
      operationId: listFeeStructures
      tags: [fees]
      summary: List fee structures
      parameters:
        - name: courseId
          in: query
          schema:
            type: integer
        - name: academicYear
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Fee structure list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeeStructure"
    post:
      operationId: createFeeStructure
      tags: [fees]
      summary: Create fee structure
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFeeStructureBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeeStructure"

  /fee-payments:
    get:
      operationId: listFeePayments
      tags: [fees]
      summary: List fee payments
      parameters:
        - name: studentId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Fee payment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeePayment"
    post:
      operationId: recordFeePayment
      tags: [fees]
      summary: Record a fee payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordFeePaymentBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeePayment"

  /fee-payments/student/{studentId}/dues:
    get:
      operationId: getStudentDues
      tags: [fees]
      summary: Get dues for a student
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Student dues
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentDues"

  /razorpay/create-order:
    post:
      operationId: createRazorpayOrder
      tags: [fees]
      summary: Create a Razorpay order for fee payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRazorpayOrderBody"
      responses:
        "201":
          description: Razorpay order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RazorpayOrderResponse"

  /razorpay/verify-payment:
    post:
      operationId: verifyRazorpayPayment
      tags: [fees]
      summary: Verify Razorpay payment and record fee payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyRazorpayPaymentBody"
      responses:
        "200":
          description: Payment verified and recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeePayment"

  /razorpay/config:
    get:
      operationId: getRazorpayConfig
      tags: [fees]
      summary: Get Razorpay public key for frontend
      responses:
        "200":
          description: Razorpay config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RazorpayConfig"

  # ── Exams ──
