      operationId: listExamResults
      tags: [exams]
      summary: List exam results
      parameters:
        - name: examId
          in: query
          schema:
            type: integer
        - name: studentId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Exam results
          content:
            application/json:
              schema:
                type: array
