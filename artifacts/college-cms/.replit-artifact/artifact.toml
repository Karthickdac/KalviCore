kind = "web"
previewPath = "/"
title = "College Management System"
version = "1.0.0"
id = "artifacts/college-cms"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25542

[services.development]
run = "pnpm --filter @workspace/college-cms run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/college-cms", "run", "build" ]
publicDir = "artifacts/college-cms/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25542"
BASE_PATH = "/"
